<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户管理系统</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- 登录/注册页面 -->
      <div id="auth-section">
        <div class="login-container">
          <h1 style="text-align: center; color: #333; margin-bottom: 10px">
            离线登录系统
          </h1>
          <p style="text-align: center; color: #888; margin-bottom: 30px">
            📁 数据本地存储123456
          </p>

          <div class="tab-buttons">
            <button class="tab-btn active" data-tab="login">登录</button>
            <button class="tab-btn" data-tab="register">注册</button>
          </div>

          <div id="login-form" style="z-index: 999;">
            <div class="form-group">
              <label>用户名</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input
                  type="text"
                  id="login-username"
                  placeholder="请输入用户名"
                />
              </div>
            </div>

            <div class="form-group">
              <label>密码</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input
                  type="password"
                  id="login-password"
                  placeholder="请输入密码"
                />
              </div>
            </div>

            <button class="submit-btn" id="login-submit">登 录</button>
          </div>

          <div id="register-form" style="display: none; z-index: 999;">
            <div class="form-group">
              <label>用户名</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input
                  type="text"
                  id="register-username"
                  placeholder="至少3个字符"
                />
              </div>
            </div>

            <div class="form-group">
              <label>密码</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input
                  type="password"
                  id="register-password"
                  placeholder="至少6个字符"
                />
              </div>
            </div>

            <div class="form-group">
              <label>确认密码</label>
              <div class="input-wrapper">
                <span class="input-icon">✓</span>
                <input
                  type="password"
                  id="register-confirm-password"
                  placeholder="再次输入密码"
                />
              </div>
            </div>

            <button class="submit-btn" id="register-submit">注 册</button>
          </div>

          <div class="message-box" id="auth-message"></div>
        </div>
      </div>

      <!-- 管理页面 -->
      <div id="admin-section" style="display: none">
        <div class="admin-container">
          <div class="admin-header">
            <h1>👥 用户管理系统</h1>
            <div class="admin-header-right">
              <div class="user-badge">
                <div class="user-avatar" id="admin-avatar">U</div>
                <span class="user-name" id="admin-username">管理员</span>
              </div>
              <button class="logout-btn" id="admin-logout">退出登录</button>
            </div>
          </div>

          <!-- 统计卡片 -->
          <div class="stats-grid">
            <div class="stat-card">
              <h3>总用户数</h3>
              <div class="stat-value" id="stat-total">0</div>
            </div>
            <div
              class="stat-card"
              style="
                background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
              "
            >
              <h3>启用用户</h3>
              <div class="stat-value" id="stat-active">0</div>
            </div>
            <div
              class="stat-card"
              style="
                background: linear-gradient(135deg, #f44336 0%, #c62828 100%);
              "
            >
              <h3>禁用用户</h3>
              <div class="stat-value" id="stat-disabled">0</div>
            </div>
          </div>

          <!-- 用户表格 -->
          <div class="users-table-container">
            <table class="users-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>用户名</th>
                  <th>状态</th>
                  <th>注册时间</th>
                  <th>最后登录</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <!-- 动态填充 -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 修改密码模态框 -->
      <div class="modal" id="change-password-modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3>修改密码</h3>
            <span
              class="modal-close"
              onclick="closeModal('change-password-modal')"
              >&times;</span
            >
          </div>
          <div class="form-group">
            <label>原密码</label>
            <input
              type="password"
              class="form-control"
              id="modal-old-password"
              placeholder="请输入原密码"
            />
          </div>
          <div class="form-group">
            <label>新密码</label>
            <input
              type="password"
              class="form-control"
              id="modal-new-password"
              placeholder="至少6个字符"
            />
          </div>
          <div class="form-group">
            <label>确认新密码</label>
            <input
              type="password"
              class="form-control"
              id="modal-confirm-password"
              placeholder="再次输入新密码"
            />
          </div>
          <div class="message-box" id="modal-message"></div>
          <div class="modal-footer">
            <button class="btn" onclick="closeModal('change-password-modal')">
              取消
            </button>
            <button class="btn btn-primary" onclick="submitChangePassword()">
              确认修改
            </button>
          </div>
        </div>
      </div>

      <!-- 重置密码模态框 -->
      <div class="modal" id="reset-password-modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3>重置用户密码</h3>
            <span
              class="modal-close"
              onclick="closeModal('reset-password-modal')"
              >&times;</span
            >
          </div>
          <div class="form-group">
            <label>新密码</label>
            <input
              type="password"
              class="form-control"
              id="reset-new-password"
              placeholder="至少6个字符"
            />
          </div>
          <div class="message-box" id="reset-modal-message"></div>
          <div class="modal-footer">
            <button class="btn" onclick="closeModal('reset-password-modal')">
              取消
            </button>
            <button class="btn btn-primary" onclick="submitResetPassword()">
              确认重置
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
